<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007AFF" />
  <meta name="description" content="TransitBDG — Platform informasi dan pelaporan transportasi publik Kota Bandung" />
  <title>TransitBDG — Beranda</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- App CSS (CSS variables, dark mode, glassmorphism, components) -->
  <link rel="stylesheet" href="css/app.css" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- ── Navbar (diisi oleh app.js) ─────────────────────── -->
  <nav id="navbar" aria-label="Navigasi utama"></nav>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="container">

    <!-- Alert Kemacetan -->
    <section id="alerts-section" aria-label="Alert kemacetan" class="mb-6">
      <!-- Diisi secara dinamis oleh JavaScript -->
    </section>

    <!-- Pengumuman Aktif -->
    <section id="announcements-section" aria-label="Pengumuman aktif" class="mb-8">
      <h2 class="section-title">📢 Pengumuman</h2>
      <div id="announcements-list">
        <!-- Diisi secara dinamis oleh JavaScript -->
      </div>
    </section>

  </main>

  <!-- ── Loading Spinner (dikelola oleh app.js showLoading()) ── -->
  <div id="loading-overlay" class="loading-overlay" role="status" aria-label="Memuat...">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- ── Toast Container (dikelola oleh app.js showToast()) ─── -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Scripts ────────────────────────────────────────── -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

  <script>
    /* ── Beranda: fetch pengumuman & alert kemacetan ──────── */

    const POLL_INTERVAL_MS = 30000; // 30 detik

    /* ── Render Helpers ─────────────────────────────────── */

    /**
     * Format tanggal ISO ke string lokal Indonesia.
     * @param {string} isoString
     * @returns {string}
     */
    function formatDate(isoString) {
      if (!isoString) return '-';
      try {
        return new Date(isoString).toLocaleString('id-ID', {
          day: 'numeric',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      } catch {
        return isoString;
      }
    }

    /**
     * Render daftar pengumuman ke dalam #announcements-list.
     * @param {Array} announcements
     */
    function renderAnnouncements(announcements) {
      const listEl = document.getElementById('announcements-list');
      if (!listEl) return;

      if (!announcements || announcements.length === 0) {
        listEl.innerHTML = `
          <p class="empty-state" role="status">
            Tidak ada pengumuman aktif saat ini.
          </p>`;
        return;
      }

      listEl.innerHTML = announcements
        .map(
          (ann) => `
          <article class="announcement-card mb-3" aria-label="Pengumuman: ${escapeHtml(ann.title)}">
            <h3 class="announcement-title">${escapeHtml(ann.title)}</h3>
            <p class="text-muted" style="font-size:0.875rem;margin:0.25rem 0 0.5rem;">
              ${escapeHtml(ann.content)}
            </p>
            <p class="announcement-meta">
              ${ann.route_id ? `<span>Rute terkait: ${escapeHtml(String(ann.route_id))}</span> · ` : ''}
              <time datetime="${ann.published_at || ''}">${formatDate(ann.published_at)}</time>
            </p>
          </article>`
        )
        .join('');
    }

    /**
     * Render alert kemacetan ke dalam #alerts-section.
     * @param {Array} alerts
     */
    function renderAlerts(alerts) {
      const sectionEl = document.getElementById('alerts-section');
      if (!sectionEl) return;

      if (!alerts || alerts.length === 0) {
        sectionEl.innerHTML = '';
        return;
      }

      sectionEl.innerHTML = alerts
        .map(
          (alert) => `
          <div class="alert-banner alert-banner-warning mb-2" role="alert"
               aria-label="Alert kemacetan rute ${escapeHtml(alert.name)}">
            <span aria-hidden="true">🚦</span>
            <div>
              <strong>Alert Kemacetan — ${escapeHtml(alert.name)}</strong>
              <span class="text-muted" style="font-size:0.8125rem;margin-left:0.5rem;">
                ${alert.congestion_count} laporan kemacetan aktif dalam 1 jam terakhir
              </span>
            </div>
          </div>`
        )
        .join('');
    }

    /**
     * Escape HTML untuk mencegah XSS.
     * @param {string} str
     * @returns {string}
     */
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ── Fetch Functions ────────────────────────────────── */

    /**
     * Ambil dan render pengumuman aktif.
     */
    async function fetchAnnouncements() {
      try {
        const data = await apiFetch('/api/v1/announcements');
        renderAnnouncements(Array.isArray(data) ? data : (data.announcements || []));
      } catch (err) {
        const listEl = document.getElementById('announcements-list');
        if (listEl) {
          listEl.innerHTML = `
            <div class="alert-banner alert-banner-error" role="alert">
              <span aria-hidden="true">⚠️</span>
              <span>Gagal memuat pengumuman. Silakan coba lagi nanti.</span>
            </div>`;
        }
        console.error('[Beranda] Gagal fetch pengumuman:', err);
      }
    }

    /**
     * Ambil dan render alert kemacetan.
     */
    async function fetchAlerts() {
      try {
        const data = await apiFetch('/api/v1/alerts/congestion');
        renderAlerts(Array.isArray(data) ? data : (data.alerts || []));
      } catch (err) {
        // Alert kemacetan gagal dimuat — tidak crash halaman, cukup log
        console.error('[Beranda] Gagal fetch alert kemacetan:', err);
      }
    }

    /**
     * Refresh semua data (pengumuman + alert).
     */
    async function refreshAll() {
      await Promise.all([fetchAnnouncements(), fetchAlerts()]);
    }

    /* ── Inisialisasi ───────────────────────────────────── */

    document.addEventListener('DOMContentLoaded', async () => {
      // Tampilkan loading spinner
      showLoading(true);

      try {
        await refreshAll();
      } finally {
        showLoading(false);
      }

      // Polling setiap 30 detik untuk alert dan pengumuman
      setInterval(refreshAll, POLL_INTERVAL_MS);
    });
  </script>

</body>
</html>

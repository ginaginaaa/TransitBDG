<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007AFF" />
  <meta name="description" content="TransitBDG — Detail rute transportasi publik Kota Bandung" />
  <title>TransitBDG — Detail Rute</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <style>
    /* Star rating */
    .star-rating {
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.75rem;
      line-height: 1;
      padding: 0.125rem;
      transition: transform 0.1s ease;
      color: #d1d1d6;
    }

    .star-btn:hover,
    .star-btn.selected {
      color: #FF9F0A;
    }

    .star-btn:hover {
      transform: scale(1.15);
    }

    .star-btn:active {
      transform: scale(0.95);
    }

    /* Display stars (read-only) */
    .stars-display {
      display: inline-flex;
      gap: 0.125rem;
      font-size: 1.125rem;
    }

    .star-filled  { color: #FF9F0A; }
    .star-empty   { color: #d1d1d6; }

    .stop-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
    }

    .stop-item:last-child {
      border-bottom: none;
    }

    .stop-sequence {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stop-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius-pill);
      font-size: 0.7rem;
      font-weight: 600;
    }

    .stop-status-aktif {
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
    }

    .stop-status-nonaktif {
      background: rgba(255, 59, 48, 0.10);
      color: #ff3b30;
    }

    .route-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .route-type-tmb {
      background: rgba(0, 122, 255, 0.12);
      color: var(--accent);
    }

    .route-type-angkot {
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
    }
  </style>
</head>
<body>

  <!-- ── Navbar (diisi oleh app.js) ─────────────────────── -->
  <nav id="navbar" aria-label="Navigasi utama"></nav>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="container">

    <!-- Breadcrumb -->
    <nav aria-label="Breadcrumb" style="margin-top:1.5rem;margin-bottom:1rem;">
      <a href="routes.html" style="font-size:0.875rem;color:var(--accent);">← Kembali ke Daftar Rute</a>
    </nav>

    <!-- ── Info Rute ───────────────────────────────────── -->
    <div id="route-info" aria-live="polite">
      <!-- Diisi secara dinamis oleh JavaScript -->
    </div>

    <!-- ── Daftar Halte ────────────────────────────────── -->
    <section class="card mb-6" aria-label="Daftar halte">
      <h2 style="font-size:1rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary);">
        🚏 Daftar Halte
      </h2>
      <div id="stops-list" aria-live="polite">
        <!-- Diisi secara dinamis oleh JavaScript -->
      </div>
    </section>

    <!-- ── Rating ─────────────────────────────────────── -->
    <section id="rating-section" class="card mb-8" aria-label="Rating rute">
      <!-- Diisi secara dinamis oleh JavaScript -->
    </section>

  </main>

  <!-- ── Loading Spinner ────────────────────────────────── -->
  <div id="loading-overlay" class="loading-overlay" role="status" aria-label="Memuat...">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- ── Toast Container ────────────────────────────────── -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Scripts ────────────────────────────────────────── -->
  <!-- Leaflet.js -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/route-detail.js"></script>

</body>
</html>
